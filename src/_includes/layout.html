<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% if page.url contains '/fotowerkstaette/' %}{{ title }}{% else %}{{ title }} | LUDOVIKA{% endif %}</title>

<meta name="description" content="Fotografie aus Begegnung, Zeit und Aufmerksamkeit – Familien, Hochzeiten und Arbeiten für Unternehmen von Tom Kästenbauer.">

{% if page.url contains "/hochzeiten/" %}
<meta name="robots" content="noindex, nofollow">
{% endif %}

<link rel="stylesheet" href="/assets/css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="icon" href="{% if page.url contains '/fotowerkstaette/' %}/assets/images/fotowerkstaette/favicon.svg{% else %}/assets/images/ludovika/favicon.png{% endif %}">

<meta property="og:title" content="{{ title }} | LUDOVIKA">
<meta property="og:description" content="Fotografie aus Begegnung, Zeit und Aufmerksamkeit.">
<meta property="og:image" content="/assets/images/ludovika/start/hero.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ludovika.at">

<meta name="theme-color" content="#ffffff">

</head>

<body class="{% if page.url contains '/fotowerkstaette/' %}site-fws{% endif %}">

<div class="scroll-progress"></div>

{% include "nav.html" %}

<main>
{{ content }}
</main>

{% include "footer.html" %}

</body>
</html>
